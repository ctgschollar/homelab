---
# Provision a new Debian VM.
#
# Usage: ansible-playbook -i inventory.yml provision-debian-vm.yml -l <hostname>
#
# Stages:
#   1. (TODO) Proxmox VM creation
#   2. Post-deploy cleanup — removes installer artefacts from a freshly deployed Debian VM

- name: Post-deploy cleanup
  hosts: "{{ target | default('all') }}"
  become: true

  tasks:
    - name: Remove cdrom apt source
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list
        regexp: '^deb cdrom:'
        state: absent

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
