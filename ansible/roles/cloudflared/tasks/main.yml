---
# Cloudflared Tunnel Role - Main Tasks
# Binary installation is handled by the tools role (required_tools: [cloudflared]).

- name: Create cloudflared configuration directory
  file:
    path: /etc/cloudflared
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy cloudflared tunnel configuration
  template:
    src: config.yml.j2
    dest: /etc/cloudflared/config.yml
    owner: root
    group: root
    mode: '0644'
    backup: yes
  notify: restart cloudflared

- name: Deploy tunnel credentials file
  copy:
    content: "{{ cloudflared_tunnel_credentials | to_json }}"
    dest: "/etc/cloudflared/{{ cloudflared_tunnel_id }}.json"
    owner: root
    group: root
    mode: '0640'
  when: cloudflared_tunnel_credentials | length > 0
  notify: restart cloudflared

- name: Create systemd service file
  template:
    src: cloudflared-tunnel.service.j2
    dest: /etc/systemd/system/cloudflared-tunnel.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart cloudflared

- name: Enable and start cloudflared-tunnel service
  systemd:
    name: cloudflared-tunnel
    enabled: yes
    state: started
    daemon_reload: yes