model:
  name: "gemma4"
  base_url: "http://192.168.88.144:11434"
  api_key: "ollama"
  # Pricing per million tokens (USD) — 0.0 for local models
  input_cost_per_mtok: 0.0
  output_cost_per_mtok: 0.0
  available_models:
    - gemma4
    - qwen3.6:27b
    - qwen2.5-coder:14b
    - qwen2.5-coder:32b
    - gemma2:2b

slack:
  channel: "#homelab"
  # How long (seconds) to wait for Approve/Deny before a tier-2 plan times out.
  # Timeout = cancelled, not executed.
  veto_window_seconds: 300

docker:
  socket: "unix:///var/run/docker.sock"

swarm:
  nodes:
  - dks01.schollar.dev
  - dks02.schollar.dev
  - dks03.schollar.dev
  - dks04.schollar.dev
  - dks05.schollar.dev
  ssh_key: "/root/.ssh/ansible_ssh_key"
  ssh_user: "root"

edge:
  cloudflare_tunnel_node: "192.168.3.91"
  ssh_key: "/root/.ssh/ansible_ssh_key"
  ssh_user: "root"

ansible:
  repo_path: "/opt/homelab"
  inventory: "/opt/homelab/ansible/inventory.yml"
  git_author_name: "Homelab Agent"
  git_author_email: "agent@schollar.dev"

monitor:
  poll_interval: 30
  grace_period_seconds: 600

controller:
  mode: "monitor"
  whitelist_path: "./whitelist.json"

# -----------------------------------------------------------------------
# Safety policy
# -----------------------------------------------------------------------
safety:
  global_safe_mode: false

  safe_mode_resources:
    stacks: []
    services: []
    nodes: []

  tool_tiers:
    docker_service_list:     1
    docker_service_inspect:  1
    read_logs:               1
    read_file:               1
    get_prometheus_alerts:   1
    slack_notify:            1
    git_pull:                1
    search_incidents:        1
    write_incident_report:   1
    commit_config_updates:   2
    docker_service_scale:    2
    docker_stack_deploy:     2
    docker_stack_rollback:   2
    run_ansible_playbook:    2
    run_shell:               "agent"
    write_file:              3

  log_agent_tier_reasoning: true

  shell_command_guards:
    force_tier3: []
    force_tier2: []

# -----------------------------------------------------------------------
# Incident RAG
# -----------------------------------------------------------------------
rag:
  database: homelab_agent
  log_rag_debug: false
  # dsn: set via AGENT_POSTGRES_DSN environment variable

# -----------------------------------------------------------------------
# Action log
# -----------------------------------------------------------------------
action_log:
  path: "./action.log"

# -----------------------------------------------------------------------
# Slack approval listener
# -----------------------------------------------------------------------
approval_listener:
  host: "0.0.0.0"
  port: 8765

# -----------------------------------------------------------------------
# Conversation history
# -----------------------------------------------------------------------
history:
  path: "./agent_history.json"

# -----------------------------------------------------------------------
# Rollback state
# -----------------------------------------------------------------------
rollback:
  state_path: "./rollback_state.json"
